<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --calc-bg: #ffffff;
            --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --display-bg: #1a1a1a;
            --display-color: #ffffff;
            --btn-bg: #f0f0f0;
            --btn-color: #333333;
            --btn-hover-bg: #e0e0e0;
            --btn-shadow: rgba(0, 0, 0, 0.2);
            --operator-bg: #667eea;
            --operator-hover: #5568d3;
            --equals-bg: #764ba2;
            --equals-hover: #653a8a;
            --clear-bg: #ff6b6b;
            --clear-hover: #ee5a5a;
            --theme-toggle-bg: rgba(255, 255, 255, 0.2);
            --theme-toggle-color: #ffffff;
            --theme-toggle-hover: rgba(255, 255, 255, 0.35);
            --history-bg: rgba(255, 255, 255, 0.95);
            --history-border: rgba(0, 0, 0, 0.08);
            --history-title: #333333;
            --history-muted: #888888;
            --history-item-bg: #f5f5f5;
            --history-item-hover: #ebebeb;
            --history-expression: #555555;
            --history-result: #667eea;
            --history-clear-bg: #f0f0f0;
            --history-clear-color: #555555;
            --history-clear-hover: #e0e0e0;
        }

        :root[data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --calc-bg: #2d2d3a;
            --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            --display-bg: #1a1a24;
            --display-color: #e8e8e8;
            --btn-bg: #3d3d4d;
            --btn-color: #e8e8e8;
            --btn-hover-bg: #4d4d5d;
            --btn-shadow: rgba(0, 0, 0, 0.4);
            --operator-bg: #5a6fd6;
            --operator-hover: #4a5fc6;
            --equals-bg: #8b5cf6;
            --equals-hover: #7c4dd6;
            --clear-bg: #ef4444;
            --clear-hover: #dc2626;
            --theme-toggle-bg: rgba(255, 255, 255, 0.1);
            --theme-toggle-color: #e8e8e8;
            --theme-toggle-hover: rgba(255, 255, 255, 0.2);
            --history-bg: #252530;
            --history-border: rgba(255, 255, 255, 0.1);
            --history-title: #e8e8e8;
            --history-muted: #9ca3af;
            --history-item-bg: #3d3d4d;
            --history-item-hover: #4d4d5d;
            --history-expression: #c4c4c4;
            --history-result: #8b5cf6;
            --history-clear-bg: #3d3d4d;
            --history-clear-color: #e8e8e8;
            --history-clear-hover: #4d4d5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 20px;
            transition: background 0.3s ease;
        }

        .app {
            display: flex;
            flex-direction: row-reverse;
            gap: 24px;
            align-items: flex-start;
            width: 100%;
            max-width: 720px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--theme-toggle-bg);
            color: var(--theme-toggle-color);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: background 0.2s, color 0.3s;
        }

        .theme-toggle:hover {
            background: var(--theme-toggle-hover);
        }

        .theme-toggle-icon {
            font-size: 1.1rem;
            line-height: 1;
        }

        .calculator {
            background: var(--calc-bg);
            border-radius: 20px;
            box-shadow: var(--calc-shadow);
            padding: 30px;
            flex: 1;
            min-width: 0;
            max-width: 400px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .history {
            background: var(--history-bg);
            border: 1px solid var(--history-border);
            border-radius: 20px;
            box-shadow: var(--calc-shadow);
            padding: 20px;
            flex: 1;
            min-width: 0;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            max-height: 520px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .history-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--history-title);
        }

        .history-clear {
            background: var(--history-clear-bg);
            color: var(--history-clear-color);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-clear:hover {
            background: var(--history-clear-hover);
        }

        .history-clear:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-empty {
            color: var(--history-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 24px 8px;
        }

        .history-item {
            background: var(--history-item-bg);
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: var(--history-item-hover);
        }

        .history-expression {
            display: block;
            font-size: 0.85rem;
            color: var(--history-expression);
            margin-bottom: 4px;
            word-break: break-all;
        }

        .history-result {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--history-result);
            text-align: right;
        }

        .history-result.error {
            color: var(--clear-bg);
        }

        .history-time {
            display: block;
            font-size: 0.75rem;
            color: var(--history-muted);
            margin-top: 4px;
        }

        @media (max-width: 720px) {
            .app {
                flex-direction: column;
                align-items: stretch;
                max-width: 400px;
            }

            .calculator,
            .history {
                max-width: none;
            }

            .history {
                max-height: 240px;
            }
        }

        .display {
            background: var(--display-bg);
            color: var(--display-color);
            font-size: 2.5rem;
            padding: 20px;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            background: var(--btn-bg);
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--btn-color);
        }

        button:hover {
            background: var(--btn-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--btn-shadow);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px var(--btn-shadow);
        }

        .operator {
            background: var(--operator-bg);
            color: #ffffff;
        }

        .operator:hover {
            background: var(--operator-hover);
        }

        .equals {
            background: var(--equals-bg);
            color: #ffffff;
        }

        .equals:hover {
            background: var(--equals-hover);
        }

        .clear {
            background: var(--clear-bg);
            color: #ffffff;
        }

        .clear:hover {
            background: var(--clear-hover);
        }

        .zero {
            grid-column: span 2;
        }
    </style>
    <script>
        (function () {
            const saved = localStorage.getItem('calculator-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">
        <span class="theme-toggle-icon" id="themeIcon">🌙</span>
        <span id="themeLabel">Тёмная</span>
    </button>
    <div class="app">
        <div class="calculator">
            <div class="display" id="display">0</div>
            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="operator" onclick="appendOperator('/')">/</button>
                <button class="operator" onclick="appendOperator('*')">×</button>
                <button class="operator" onclick="deleteLast()">⌫</button>
                
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">-</button>
                
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>
                
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="equals" onclick="calculate()" rowspan="2">=</button>
                
                <button class="zero" onclick="appendNumber('0')">0</button>
                <button onclick="appendDecimal()">.</button>
            </div>
        </div>

        <aside class="history">
            <div class="history-header">
                <h2 class="history-title">Журнал операций</h2>
                <button class="history-clear" id="historyClear" type="button" disabled>Очистить</button>
            </div>
            <ul class="history-list" id="historyList">
                <li class="history-empty" id="historyEmpty">Пока нет операций</li>
            </ul>
        </aside>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');

        function updateThemeToggle(theme) {
            const isDark = theme === 'dark';
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            themeLabel.textContent = isDark ? 'Светлая' : 'Тёмная';
            themeToggle.setAttribute('aria-label', isDark ? 'Включить светлую тему' : 'Включить тёмную тему');
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('calculator-theme', theme);
            updateThemeToggle(theme);
        }

        themeToggle.addEventListener('click', function () {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        updateThemeToggle(document.documentElement.getAttribute('data-theme') || 'light');

        const HISTORY_KEY = 'calculator-history';
        const HISTORY_LIMIT = 50;

        let display = document.getElementById('display');
        let historyList = document.getElementById('historyList');
        let historyEmpty = document.getElementById('historyEmpty');
        let historyClear = document.getElementById('historyClear');
        let history = [];

        function loadHistory() {
            try {
                const saved = localStorage.getItem(HISTORY_KEY);
                history = saved ? JSON.parse(saved) : [];
                if (!Array.isArray(history)) {
                    history = [];
                }
            } catch {
                history = [];
            }
        }

        function saveHistory() {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function formatHistoryTime(timestamp) {
            return new Date(timestamp).toLocaleString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function renderHistory() {
            historyList.querySelectorAll('.history-item').forEach(function (item) {
                item.remove();
            });

            historyClear.disabled = history.length === 0;
            historyEmpty.hidden = history.length > 0;

            history.forEach(function (entry) {
                const item = document.createElement('li');
                item.className = 'history-item';
                item.title = 'Нажмите, чтобы подставить результат';

                const expression = document.createElement('span');
                expression.className = 'history-expression';
                expression.textContent = entry.expression;

                const result = document.createElement('span');
                result.className = 'history-result' + (entry.result === 'Ошибка' ? ' error' : '');
                result.textContent = '= ' + entry.result;

                const time = document.createElement('span');
                time.className = 'history-time';
                time.textContent = formatHistoryTime(entry.timestamp);

                item.appendChild(expression);
                item.appendChild(result);
                item.appendChild(time);

                item.addEventListener('click', function () {
                    if (entry.result !== 'Ошибка') {
                        currentInput = entry.result;
                        shouldResetDisplay = true;
                        updateDisplay();
                    }
                });

                historyList.appendChild(item);
            });
        }

        function addHistoryEntry(expression, result) {
            history.unshift({
                expression: expression,
                result: result,
                timestamp: Date.now()
            });

            if (history.length > HISTORY_LIMIT) {
                history = history.slice(0, HISTORY_LIMIT);
            }

            saveHistory();
            renderHistory();
        }

        function clearHistory() {
            history = [];
            saveHistory();
            renderHistory();
        }

        historyClear.addEventListener('click', clearHistory);
        loadHistory();
        renderHistory();

        let currentInput = '0';
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (currentInput === '0') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (!currentInput.includes('.')) {
                currentInput += '.';
                updateDisplay();
            }
        }

        function appendOperator(operator) {
            if (shouldResetDisplay) {
                shouldResetDisplay = false;
            }
            
            const lastChar = currentInput[currentInput.length - 1];
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function calculate() {
            const expressionForHistory = currentInput;

            try {
                // Заменяем × на * для вычисления
                let expression = currentInput.replace(/×/g, '*');
                
                // Проверяем на деление на ноль
                if (expression.includes('/0') && !expression.includes('/0.')) {
                    currentInput = 'Ошибка';
                    addHistoryEntry(expressionForHistory, 'Ошибка');
                    updateDisplay();
                    shouldResetDisplay = true;
                    return;
                }
                
                const result = Function('"use strict"; return (' + expression + ')')();
                
                if (isNaN(result) || !isFinite(result)) {
                    currentInput = 'Ошибка';
                    addHistoryEntry(expressionForHistory, 'Ошибка');
                } else {
                    currentInput = result.toString();
                    addHistoryEntry(expressionForHistory, currentInput);
                }
                
                updateDisplay();
                shouldResetDisplay = true;
            } catch (error) {
                currentInput = 'Ошибка';
                addHistoryEntry(expressionForHistory, 'Ошибка');
                updateDisplay();
                shouldResetDisplay = true;
            }
        }

        function clearDisplay() {
            currentInput = '0';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (shouldResetDisplay) {
                clearDisplay();
                return;
            }
            
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Поддержка клавиатуры
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendDecimal();
            } else if (key === '+') {
                appendOperator('+');
            } else if (key === '-') {
                appendOperator('-');
            } else if (key === '*') {
                appendOperator('*');
            } else if (key === '/') {
                event.preventDefault();
                appendOperator('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
